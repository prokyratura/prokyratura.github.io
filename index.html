<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market 24</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--tg-theme-bg-color, #1c1c1e); color: var(--tg-theme-text-color, #fff); padding: 16px; }
        h1 { text-align: center; margin-bottom: 24px; font-size: 28px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card {
            background: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 16px; padding: 20px; text-align: center;
            border: 2px solid transparent; cursor: pointer;
        }
        .card.selected { border-color: var(--tg-theme-button-color, #34c759); }
        .stars { font-size: 24px; font-weight: 700; display: block; }
        .price { color: var(--tg-theme-button-color, #34c759); font-size: 20px; font-weight: 700; }
        .price-usdt { color: var(--tg-theme-hint-color, #8e8e93); font-size: 14px; margin-top: 4px; }
        .payment { display: flex; gap: 12px; margin: 20px 0; }
        .method { flex: 1; background: var(--tg-theme-secondary-bg-color, #2c2c2e); border-radius: 12px; padding: 12px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .method.selected { border-color: var(--tg-theme-button-color, #34c759); }
        .recipient { background: var(--tg-theme-secondary-bg-color, #2c2c2e); border-radius: 12px; padding: 12px; margin: 16px 0; display: flex; gap: 8px; }
        .recipient input { background: none; border: none; color: var(--tg-theme-text-color, #fff); flex: 1; outline: none; }
        .btn {
            background: var(--tg-theme-button-color, #34c759); color: var(--tg-theme-button-text-color, #fff);
            border: none; border-radius: 12px; padding: 16px; font-size: 18px; font-weight: 600; width: 100%;
            cursor: pointer; margin-top: 20px;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <h1>⭐ Star Market 24</h1>

    <div class="grid" id="packages"></div>

    <div class="recipient hidden" id="recipientBlock">
        <span>👤</span>
        <input type="text" id="recipient" placeholder="@username получателя">
    </div>

    <div class="payment hidden" id="paymentBlock"></div>

    <button class="btn hidden" id="payBtn" onclick="processPayment()">💳 Оплатить</button>

    <script>
        const tg = Telegram?.WebApp;
        tg?.ready();
        tg?.expand();

        const packages = [
            { stars: 50, rub: 75, usdt: 0.83 },
            { stars: 100, rub: 145, usdt: 1.61 },
            { stars: 250, rub: 370, usdt: 4.11 },
            { stars: 500, rub: 730, usdt: 8.11 },
            { stars: 1000, rub: 1450, usdt: 16.11 },
            { stars: 5000, rub: 7200, usdt: 80 }
        ];

        let selectedPackage = null;
        let selectedPayment = null;

        const packagesGrid = document.getElementById('packages');

        packages.forEach(pkg => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="stars">${pkg.stars} ⭐</span>
                <span class="price">${pkg.rub} ₽</span>
                <div class="price-usdt">≈ ${pkg.usdt} USDT</div>
            `;
            card.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedPackage = pkg;
                document.getElementById('recipientBlock').classList.remove('hidden');
                document.getElementById('paymentBlock').classList.remove('hidden');
                document.getElementById('payBtn').classList.remove('hidden');
                renderPaymentMethods();
            };
            packagesGrid.appendChild(card);
        });

        function renderPaymentMethods() {
            const block = document.getElementById('paymentBlock');
            block.innerHTML = '';

            const methods = [
                { id: 'crypto', name: '💰 Crypto Bot', desc: 'USDT' },
                { id: 'lava', name: '💳 LAVA', desc: 'Рубли' }
            ];

            methods.forEach(m => {
                const div = document.createElement('div');
                div.className = 'method';
                div.innerHTML = `<div>${m.name}</div><small>${m.desc}</small>`;
                div.onclick = () => {
                    document.querySelectorAll('.method').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedPayment = m.id;
                };
                block.appendChild(div);
            });
        }

        window.processPayment = function() {
            if (!selectedPackage || !selectedPayment) return;

            const recipient = document.getElementById('recipient').value.trim();
            if (!recipient) {
                alert('Укажите получателя');
                return;
            }

            const data = {
                action: 'create_invoice',
                stars: selectedPackage.stars,
                price_rub: selectedPackage.rub,
                price_usdt: selectedPackage.usdt,
                payment_method: selectedPayment,
                recipient: recipient.replace('@', '')
            };

            tg?.sendData(JSON.stringify(data));
            tg?.close();
        };
    </script>
</body>
</html>
