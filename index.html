Я добавил в этот код «принудительную» проверку. Если вы открыли его через Главную кнопку меню, он обязан отправить данные и закрыться.
html
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market</title>
    <!-- 1. ПОДКЛЮЧАЕМ SDK ПЕРВЫМ -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn: var(--tg-theme-button-color, #2481cc);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; text-align: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .card { background: var(--sec); padding: 20px 10px; border-radius: 12px; border: 1px solid rgba(0,0,0,0.1); cursor: pointer; }
        .stars-count { font-size: 20px; font-weight: bold; display: block; }
        .price-tag { color: var(--btn); font-weight: bold; }
    </style>
</head>
<body>

    <h2>⭐ Выберите пакет звезд</h2>
    <div class="grid" id="main-grid"></div>

    <script>
        // Инициализация Telegram SDK
        const tg = window.Telegram.WebApp;

        // Сообщаем Telegram, что приложение готово
        tg.ready();
        tg.expand();

        const offers = [
            { s: 50, p: 75 }, { s: 100, p: 145 }, { s: 250, p: 370 },
            { s: 500, p: 730 }, { s: 1000, p: 1450 }, { s: 5000, p: 7200 }
        ];

        const grid = document.getElementById('main-grid');

        offers.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="stars-count">${item.s} ⭐</span>
                <span class="price-tag">${item.p} ₽</span>
            `;

            card.onclick = function() {
                // Формируем данные
                const data = JSON.stringify({
                    stars: item.s,
                    price: item.p
                });

                // ОТПРАВКА ДАННЫХ БОТУ
                // Метод sendData работает ТОЛЬКО в главной кнопке меню
                try {
                    tg.sendData(data);
                    tg.close(); // Закрываем приложение после нажатия
                } catch (e) {
                    alert("Ошибка отправки! Убедитесь, что открыли через кнопку меню.");
                }
            };
            grid.appendChild(card);
        });
    </script>
</body>
