<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Market</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --hint-color: var(--tg-theme-hint-color, #8e8e93);
            --button-color: var(--tg-theme-button-color, #2481cc);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px; text-align: center;
            -webkit-user-select: none;
        }

        h2 { font-size: 22px; margin-bottom: 5px; }
        .subtitle { color: var(--hint-color); font-size: 14px; margin-bottom: 25px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .card {
            background-color: var(--secondary-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card:active { transform: scale(0.95); background-color: rgba(255,255,255,0.1); }

        .stars-count { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .price { color: #34c759; font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <h2>⭐ Купить Звезды</h2>
    <p class="subtitle">Выберите пакет для пополнения</p>

    <div class="grid" id="main-grid"></div>

    <script>
        // Безопасная инициализация
        const tg = window.Telegram ? window.Telegram.WebApp : null;

        if (tg) {
            tg.ready();
            tg.expand();
        }

        const offers = [
            { stars: 50, price: 75 }, { stars: 100, price: 145 },
            { stars: 250, price: 370 }, { stars: 500, price: 730 },
            { stars: 1000, price: 1450 }, { stars: 5000, price: 7200 }
        ];

        const grid = document.getElementById('main-grid');

        offers.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="stars-count">${item.stars} ⭐</span>
                <span class="price">${item.price} ₽</span>
            `;

            card.onclick = function() {
                const data = JSON.stringify({
                    stars: item.stars,
                    price: item.price
                });

                if (tg && tg.sendData) {
                    tg.sendData(data); // Работает в Telegram
                } else {
                    alert("Вы выбрали " + item.stars + " звезд за " + item.price + "₽.\nВ Telegram боте здесь начнется оформление заказа.");
                }
            };
            grid.appendChild(card);
        });
    </script>
</body>
</html>
