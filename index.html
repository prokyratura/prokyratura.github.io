<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: sans-serif; background-color: #1c1c1e; color: white;
            margin: 0; padding: 20px; text-align: center;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .card {
            background: #2c2c2e; padding: 20px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .card:active { transform: scale(0.95); background: #3a3a3c; }
        .s { font-size: 20px; font-weight: bold; display: block; }
        .p { color: #34c759; font-weight: bold; margin-top: 5px; display: block; }
    </style>
</head>
<body>
    <h2>⭐ Магазин Звезд</h2>
    <div class="grid" id="main-grid"></div>

    <script>
        // Безопасно получаем WebApp
        const tg = window.Telegram && window.Telegram.WebApp ? window.Telegram.WebApp : null;
        if (tg) { tg.ready(); tg.expand(); }

        const offers = [
            { stars: 50, price: 75 }, { stars: 100, price: 145 },
            { stars: 250, price: 370 }, { stars: 500, price: 730 },
            { stars: 1000, price: 1450 }, { stars: 5000, price: 7200 }
        ];

        const container = document.getElementById('main-grid');

        offers.forEach(item => {
            const div = document.createElement('div');
            div.className = 'card';
            div.innerHTML = `<span class="s">${item.stars} ⭐</span><span class="p">${item.price} ₽</span>`;

            div.onclick = () => {
                const data = JSON.stringify({stars: item.stars, price: item.price});
                if (tg && tg.sendData) {
                    tg.sendData(data); // Отправка боту
                } else {
                    alert("Запустите через меню бота!");
                }
            };
            container.appendChild(div);
        });
    </script>
</body>
</html>
