<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market</title>
    <!-- ПРАВИЛЬНОЕ ПОДКЛЮЧЕНИЕ SDK (ОБЯЗАТЕЛЬНО) -->
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --hint: var(--tg-theme-hint-color, #999999);
            --btn: var(--tg-theme-button-color, #2481cc);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0; padding: 16px;
            display: flex; flex-direction: column; align-items: center;
        }
        h2 { font-size: 22px; margin-bottom: 20px; }

        /* Сетка плиток */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Две колонки */
            gap: 12px;
            width: 100%;
            max-width: 400px;
        }

        /* Стиль плитки */
        .card {
            background: var(--sec);
            padding: 20px 10px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.1s ease;
            cursor: pointer;
        }
        .card:active { transform: scale(0.95); background: rgba(0,0,0,0.05); }

        .stars-count { font-size: 24px; font-weight: bold; display: block; margin-bottom: 4px; }
        .price-tag { color: var(--btn); font-weight: 600; font-size: 16px; }
    </style>
</head>
<body>

    <h2>⭐ Купить Звезды</h2>
    <div class="grid" id="main-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;

        // 1. Убираем надпись "Ожидание загрузки"
        tg.ready();
        tg.expand();

        // Данные для плиток
        const offers = [
            { stars: 50, price: 75 },
            { stars: 100, price: 145 },
            { stars: 250, price: 370 },
            { stars: 500, price: 730 },
            { stars: 1000, price: 1450 },
            { stars: 2500, price: 3600 },
            { stars: 5000, price: 7200 }
        ];

        const gridContainer = document.getElementById('main-grid');

        // Отрисовка плиток
        offers.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="stars-count">${item.stars} ⭐</span>
                <span class="price-tag">${item.price} ₽</span>
            `;

            // Клик по плитке
            card.onclick = () => {
                // Отправляем данные боту
                tg.sendData(JSON.stringify({
                    action: "buy_stars",
                    amount: item.stars,
                    price: item.price
                }));
            };

            gridContainer.appendChild(card);
        });

        // Настраиваем цвета основной кнопки (опционально)
        tg.MainButton.setText("ВЫБЕРИТЕ ПАКЕТ").hide();
    </script>
</body>
</html>
