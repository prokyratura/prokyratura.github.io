<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Market</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg-color: var(--tg-theme-bg-color, #1c1c1e);
            --text-color: var(--tg-theme-text-color, #ffffff);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0; padding: 20px; text-align: center;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }

        .card {
            background-color: var(--secondary-bg);
            padding: 20px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer; transition: transform 0.1s;
            display: flex; flex-direction: column; align-items: center;
        }

        .card:active { transform: scale(0.95); background-color: rgba(255,255,255,0.1); }
        .stars-count { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .price { color: #34c759; font-weight: bold; }
    </style>
</head>
<body>

    <h2>⭐ Купить Звезды</h2>
    <div class="grid" id="main-grid"></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const offers = [
            { stars: 50, price: 75 }, { stars: 100, price: 145 },
            { stars: 250, price: 370 }, { stars: 500, price: 730 },
            { stars: 1000, price: 1450 }, { stars: 5000, price: 7200 }
        ];

        const grid = document.getElementById('main-grid');

        offers.forEach(item => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="stars-count">${item.stars} ⭐</span>
                <span class="price">${item.price} ₽</span>
            `;

            card.onclick = function() {
                // Прямая отправка данных боту
                const data = JSON.stringify({
                    stars: item.stars,
                    price: item.price
                });

                if (tg.sendData) {
                    tg.sendData(data); // Закрывает Mini App и отправляет JSON
                } else {
                    alert("Откройте через кнопку меню в боте!");
                }
            };
            grid.appendChild(card);
        });
    </script>
</body>
</html>
