<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market 24</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--tg-theme-bg-color, #1c1c1e);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 16px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .header p {
            color: var(--tg-theme-hint-color, #8e8e93);
            font-size: 14px;
        }

        .username-badge {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 20px;
            padding: 8px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .username-icon {
            font-size: 16px;
        }

        .username-text {
            color: var(--tg-theme-text-color, #ffffff);
            font-weight: 500;
        }

        .username-edit {
            margin-left: auto;
            color: var(--tg-theme-button-color, #34c759);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 12px;
            background-color: rgba(52, 199, 89, 0.1);
        }

        .packages-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .packages-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .package-card {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 16px;
            padding: 20px 12px;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .package-card.selected {
            border-color: var(--tg-theme-button-color, #34c759);
            transform: scale(1.02);
            background-color: var(--tg-theme-bg-color, #1c1c1e);
        }

        .package-card:active {
            transform: scale(0.98);
        }

        .package-stars {
            font-size: 28px;
            font-weight: 700;
            color: var(--tg-theme-text-color, #ffffff);
            margin-bottom: 8px;
        }

        .package-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--tg-theme-button-color, #34c759);
        }

        .package-price-usdt {
            font-size: 14px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-top: 4px;
        }

        .popular-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ffd700;
            color: #000;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .order-summary {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }

        .summary-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: var(--tg-theme-hint-color, #8e8e93);
            font-size: 14px;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid rgba(255,255,255,0.1);
            font-weight: 700;
            color: var(--tg-theme-text-color, #ffffff);
        }

        .recipient-input {
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .recipient-input span {
            color: var(--tg-theme-hint-color, #8e8e93);
            font-size: 16px;
        }

        .recipient-input input {
            background: transparent;
            border: none;
            color: var(--tg-theme-text-color, #ffffff);
            font-size: 16px;
            flex: 1;
            outline: none;
        }

        .recipient-input input::placeholder {
            color: var(--tg-theme-hint-color, #8e8e93);
            opacity: 0.5;
        }

        .payment-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .payment-methods {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
        }

        .payment-method {
            flex: 1;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            border-radius: 12px;
            padding: 16px 12px;
            text-align: center;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .payment-method.selected {
            border-color: var(--tg-theme-button-color, #34c759);
            background-color: var(--tg-theme-bg-color, #1c1c1e);
        }

        .payment-method:active {
            transform: scale(0.97);
        }

        .payment-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .payment-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .payment-desc {
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
        }

        .action-button {
            background-color: var(--tg-theme-button-color, #34c759);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 12px;
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 12px;
        }

        .action-button:active {
            transform: scale(0.98);
            opacity: 0.9;
        }

        .action-button:disabled {
            background-color: var(--tg-theme-hint-color, #8e8e93);
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            background-color: var(--tg-theme-secondary-bg-color, #2c2c2e);
            font-size: 14px;
            display: none;
        }

        .status-message.visible {
            display: block;
        }

        .status-message.success {
            color: var(--tg-theme-button-color, #34c759);
        }

        .status-message.error {
            color: #ff3b30;
        }

        .footer {
            text-align: center;
            font-size: 12px;
            color: var(--tg-theme-hint-color, #8e8e93);
            margin-top: auto;
            padding-top: 20px;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: var(--tg-theme-button-color, #34c759);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Star Market 24</h1>
        <p>⭐ Покупка Telegram Stars</p>
    </div>

    <div class="username-badge" id="usernameBadge">
        <span class="username-icon">👤</span>
        <span class="username-text" id="usernameDisplay">@username</span>
        <span class="username-edit" onclick="editUsername()">Изменить</span>
    </div>

    <div class="packages-title">🔥 Выберите пакет звезд</div>

    <div class="packages-grid" id="packagesGrid"></div>

    <div class="recipient-input" id="recipientInput" style="display: none;">
        <span>👤</span>
        <input type="text" id="recipientField" placeholder="@username получателя" value="@">
    </div>

    <div class="order-summary" id="orderSummary">
        <div class="summary-title">📋 Ваш заказ</div>
        <div class="summary-row">
            <span>Пакет:</span>
            <span id="summaryStars">-</span>
        </div>
        <div class="summary-row">
            <span>Цена:</span>
            <span id="summaryPrice">-</span>
        </div>
        <div class="summary-row">
            <span>Получатель:</span>
            <span id="summaryRecipient">-</span>
        </div>
        <div class="summary-total">
            <span>К оплате:</span>
            <span id="summaryTotal">-</span>
        </div>
    </div>

    <div class="payment-title">💳 Способ оплаты</div>

    <div class="payment-methods">
        <div class="payment-method" data-method="crypto" onclick="selectPayment('crypto')">
            <div class="payment-icon">💰</div>
            <div class="payment-name">Crypto Bot</div>
            <div class="payment-desc">USDT (TRC-20)</div>
        </div>
        <div class="payment-method" data-method="lava" onclick="selectPayment('lava')">
            <div class="payment-icon">💳</div>
            <div class="payment-name">LAVA</div>
            <div class="payment-desc">Рубли, карты РФ</div>
        </div>
    </div>

    <button class="action-button" id="payButton" onclick="processPayment()" disabled>
        💳 Оплатить
    </button>

    <div class="status-message" id="statusMessage"></div>

    <div class="footer" id="footer">
        @StarMarket24Bot • Мгновенная доставка
    </div>

    <script>
        // Инициализация Telegram WebApp
        let tg = null;
        let selectedPackage = null;
        let selectedPayment = null;
        let userData = null;

        try {
            tg = window.Telegram?.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();

                // Получаем данные пользователя
                userData = tg.initDataUnsafe?.user;
                if (userData?.username) {
                    document.getElementById('usernameDisplay').textContent = '@' + userData.username;
                }
            }
        } catch (e) {
            console.log('Вне Telegram WebApp');
        }

        // Курс USDT к RUB
        const USDT_RATE = 90;

        // Ассортимент с ценами в RUB и USDT
        const packages = [
            { stars: 50, price_rub: 75, price_usdt: (75 / USDT_RATE).toFixed(2) },
            { stars: 100, price_rub: 145, price_usdt: (145 / USDT_RATE).toFixed(2) },
            { stars: 250, price_rub: 370, price_usdt: (370 / USDT_RATE).toFixed(2), popular: true },
            { stars: 500, price_rub: 730, price_usdt: (730 / USDT_RATE).toFixed(2) },
            { stars: 1000, price_rub: 1450, price_usdt: (1450 / USDT_RATE).toFixed(2) },
            { stars: 5000, price_rub: 7200, price_usdt: (7200 / USDT_RATE).toFixed(2), popular: true }
        ];

        // Отрисовка пакетов
        const packagesGrid = document.getElementById('packagesGrid');

        packages.forEach(pkg => {
            const card = document.createElement('div');
            card.className = 'package-card';
            card.setAttribute('data-stars', pkg.stars);
            card.setAttribute('data-price-rub', pkg.price_rub);
            card.setAttribute('data-price-usdt', pkg.price_usdt);

            let badgeHtml = '';
            if (pkg.popular) {
                badgeHtml = '<div class="popular-badge">🔥 Популярное</div>';
            }

            card.innerHTML = `
                ${badgeHtml}
                <div class="package-stars">${pkg.stars} ⭐</div>
                <div class="package-price">${pkg.price_rub} ₽</div>
                <div class="package-price-usdt">≈ ${pkg.price_usdt} USDT</div>
            `;

            card.onclick = () => selectPackage(pkg.stars, pkg.price_rub, pkg.price_usdt, card);
            packagesGrid.appendChild(card);
        });

        // Выбор пакета
        function selectPackage(stars, priceRub, priceUsdt, element) {
            document.querySelectorAll('.package-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');

            selectedPackage = { stars, priceRub, priceUsdt };

            // Показываем поле для получателя, если его нет в username
            document.getElementById('recipientInput').style.display = 'flex';

            updateOrderSummary();
            updatePayButton();

            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Обновление сводки заказа
        function updateOrderSummary() {
            if (!selectedPackage) return;

            const recipient = getRecipient();

            document.getElementById('orderSummary').style.display = 'block';
            document.getElementById('summaryStars').textContent = `${selectedPackage.stars} ⭐`;

            const priceText = selectedPayment === 'crypto'
                ? `${selectedPackage.priceUsdt} USDT`
                : `${selectedPackage.priceRub} ₽`;

            document.getElementById('summaryPrice').textContent = priceText;
            document.getElementById('summaryRecipient').textContent = recipient;
            document.getElementById('summaryTotal').textContent = priceText;
        }

        // Получение получателя
        function getRecipient() {
            const customRecipient = document.getElementById('recipientField').value.trim();
            if (customRecipient && customRecipient !== '@') {
                return customRecipient;
            }
            return userData?.username ? '@' + userData.username : '@username';
        }

        // Редактирование username
        window.editUsername = function() {
            document.getElementById('recipientInput').style.display = 'flex';
            document.getElementById('recipientField').focus();
        }

        // Выбор способа оплаты
        window.selectPayment = function(method) {
            document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('selected'));
            document.querySelector(`[data-method="${method}"]`).classList.add('selected');
            selectedPayment = method;

            updateOrderSummary();
            updatePayButton();

            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }

        // Обновление кнопки оплаты
        function updatePayButton() {
            const payButton = document.getElementById('payButton');
            const recipient = getRecipient();
            payButton.disabled = !(selectedPackage && selectedPayment && recipient && recipient !== '@');
        }

        // Показ статуса
        function showStatus(message, type = 'info') {
            const statusEl = document.getElementById('statusMessage');
            statusEl.textContent = message;
            statusEl.className = 'status-message visible';

            if (type === 'success') {
                statusEl.classList.add('success');
            } else if (type === 'error') {
                statusEl.classList.add('error');
            }

            setTimeout(() => {
                statusEl.classList.remove('visible');
            }, 5000);
        }

        // Обработка оплаты
        window.processPayment = async function() {
            if (!selectedPackage || !selectedPayment) return;

            const recipient = getRecipient();
            if (!recipient || recipient === '@') {
                showStatus('❌ Укажите получателя звезд', 'error');
                return;
            }

            const payButton = document.getElementById('payButton');
            payButton.disabled = true;
            payButton.innerHTML = '<span class="loading"></span> Создание счета...';

            // Формируем данные для отправки в бот
            const orderData = {
                action: 'create_invoice',
                stars: selectedPackage.stars,
                price_rub: selectedPackage.priceRub,
                price_usdt: parseFloat(selectedPackage.priceUsdt),
                payment_method: selectedPayment,
                recipient: recipient.replace('@', ''),
                user_id: userData?.id || 0,
                username: userData?.username || ''
            };

            try {
                // Отправляем запрос в бот
                if (tg && tg.sendData) {
                    tg.sendData(JSON.stringify(orderData));

                    showStatus('⏳ Счет создается...', 'info');

                    // Бот ответит отдельным сообщением со ссылкой на оплату
                    setTimeout(() => {
                        payButton.disabled = false;
                        payButton.innerHTML = '💳 Оплатить';

                        tg.close();
                    }, 2000);
                } else {
                    // Демо-режим
                    alert(`ДЕМО: Создание счета на ${selectedPackage.stars}⭐\nСпособ: ${selectedPayment}\nПолучатель: ${recipient}`);

                    payButton.disabled = false;
                    payButton.innerHTML = '💳 Оплатить';
                }
            } catch (error) {
                showStatus('❌ Ошибка создания счета', 'error');
                payButton.disabled = false;
                payButton.innerHTML = '💳 Оплатить';
            }
        }

        // Слушаем изменения в поле получателя
        document.getElementById('recipientField').addEventListener('input', function() {
            updateOrderSummary();
            updatePayButton();
        });

        // Обновление темы Telegram
        if (tg) {
            tg.onEvent('themeChanged', function() {
                document.body.style.backgroundColor = tg.themeParams.bg_color || '#1c1c1e';
                document.body.style.color = tg.themeParams.text_color || '#ffffff';
            });
        }
    </script>
</body>
</html>
