<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --btn: var(--tg-theme-button-color, #2481cc);
            --btn-text: var(--tg-theme-button-text-color, #ffffff);
            --sec: var(--tg-theme-secondary-bg-color, #f4f4f5);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0; padding: 15px;
        }
        h2 { font-size: 20px; margin-bottom: 20px; text-align: center; }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .card {
            background: var(--sec);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            cursor: pointer;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .card:active { transform: scale(0.95); opacity: 0.8; }
        .stars { font-size: 24px; display: block; margin-bottom: 5px; }
        .price { font-weight: bold; color: var(--btn); font-size: 18px; }
    </style>
</head>
<body>
    <h2>⭐ Выберите пакет звезд</h2>
    <div class="grid" id="grid">
        <!-- Кнопки будут созданы здесь -->
    </div>

    <script>
        try {
            const tg = window.Telegram.WebApp;
            tg.expand(); // Развернуть приложение
            tg.ready();  // Сообщить TG, что мы готовы

            // Данные для карточек
            const prices = {
                "50": 75,
                "100": 145,
                "250": 370,
                "500": 730,
                "1000": 1450,
                "2500": 3600,
                "5000": 7200
            };

            const grid = document.getElementById('grid');

            // Создаем карточки через цикл
            Object.keys(prices).forEach(stars => {
                const price = prices[stars];
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="stars">${stars} ⭐</span>
                    <span class="price">${price} ₽</span>
                `;

                card.onclick = function() {
                    const data = JSON.stringify({stars: stars, price: price});
                    tg.sendData(data); // Отправка данных в бот
                };

                grid.appendChild(card);
            });
        } catch (e) {
            document.body.innerHTML += `<p style="color:red">Ошибка: ${e.message}</p>`;
        }
    </script>
</body>
</html>
