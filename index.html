<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stars Market</title>
    <script src="https://telegram.org"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #1c1c1e);
            --text: var(--tg-theme-text-color, #ffffff);
            --sec-bg: var(--tg-theme-secondary-bg-color, #2c2c2e);
        }
        body {
            font-family: sans-serif; background-color: var(--bg); color: var(--text);
            margin: 0; padding: 20px; text-align: center;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .card {
            background-color: var(--sec-bg); padding: 20px; border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05); cursor: pointer;
        }
        .card:active { transform: scale(0.95); opacity: 0.8; }
        .s { font-size: 20px; font-weight: bold; display: block; }
        .p { color: #34c759; font-weight: bold; margin-top: 5px; display: block; }
        #error-log { color: red; font-size: 10px; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>⭐ Купить Звезды</h2>
    <div class="grid" id="main-grid"></div>
    <div id="error-log"></div>

    <script>
        try {
            const tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();

            const offers = [
                { stars: 50, price: 75 }, { stars: 100, price: 145 },
                { stars: 250, price: 370 }, { stars: 500, price: 730 },
                { stars: 1000, price: 1450 }, { stars: 5000, price: 7200 }
            ];

            const grid = document.getElementById('main-grid');

            offers.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<span class="s">${item.stars} ⭐</span><span class="p">${item.price} ₽</span>`;

                card.onclick = function() {
                    const data = JSON.stringify({stars: item.stars, price: item.price});
                    if (tg.sendData) {
                        tg.sendData(data);
                    } else {
                        alert("Запустите через кнопку в боте!");
                    }
                };
                grid.appendChild(card);
            });
        } catch (e) {
            document.getElementById('error-log').innerText = "Ошибка JS: " + e.message;
        }
    </script>
</body>
</html>
