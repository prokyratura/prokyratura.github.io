<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Star Market 24</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, system-ui, sans-serif; }
        body { background: var(--tg-theme-bg-color, #1c1c1e); color: var(--tg-theme-text-color, #fff); padding: 16px; }
        h1 { text-align: center; margin-bottom: 24px; font-size: 28px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .card { background: var(--tg-theme-secondary-bg-color, #2c2c2e); border-radius: 16px; padding: 20px; text-align: center; border: 2px solid transparent; cursor: pointer; }
        .card.selected { border-color: var(--tg-theme-button-color, #34c759); }
        .stars { font-size: 24px; font-weight: 700; display: block; }
        .price { color: var(--tg-theme-button-color, #34c759); font-size: 20px; font-weight: 700; }
        .recipient { background: var(--tg-theme-secondary-bg-color, #2c2c2e); border-radius: 12px; padding: 12px; margin: 16px 0; display: none; gap: 8px; }
        .recipient.visible { display: flex; }
        .recipient input { background: none; border: none; color: var(--tg-theme-text-color, #fff); flex: 1; outline: none; }
        .btn { background: var(--tg-theme-button-color, #34c759); color: var(--tg-theme-button-text-color, #fff); border: none; border-radius: 12px; padding: 16px; font-size: 18px; font-weight: 600; width: 100%; cursor: pointer; margin-top: 20px; display: none; }
        .btn.visible { display: block; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .error { color: #ff3b30; margin-top: 8px; text-align: center; display: none; }
        .error.visible { display: block; }
        .payment-info { background: var(--tg-theme-secondary-bg-color, #2c2c2e); border-radius: 12px; padding: 12px; margin: 16px 0; display: none; text-align: center; }
        .payment-info.visible { display: block; }
        .payment-method { display: flex; align-items: center; justify-content: center; gap: 8px; color: var(--tg-theme-button-color, #34c759); }
    </style>
</head>
<body>
    <h1>⭐ Star Market 24</h1>

    <div class="grid" id="packages"></div>

    <div class="recipient" id="recipientBlock">
        <span>👤 @</span>
        <input type="text" id="recipient" placeholder="username" autocomplete="off">
    </div>

    <div class="payment-info" id="paymentInfo">
        <div class="payment-method">
            <span>💳 ROBOKASSA</span>
        </div>
        <small>СБП, карты РФ, электронные кошельки</small>
    </div>

    <div class="error" id="errorMsg"></div>

    <button class="btn" id="payBtn">💳 Оплатить через ROBOKASSA</button>

    <script>
        console.log('🚀 Star Market 24 приложение загружено');

        const tg = window.Telegram?.WebApp;
        if (tg) {
            console.log('✅ Telegram WebApp доступен');
            tg.ready();
            tg.expand();
        }

        const packages = [
            { stars: 50, rub: 75 },
            { stars: 100, rub: 145 },
            { stars: 250, rub: 370 },
            { stars: 500, rub: 730 },
            { stars: 1000, rub: 1450 },
            { stars: 5000, rub: 7200 }
        ];

        let selectedPackage = null;

        const packagesGrid = document.getElementById('packages');
        const recipientBlock = document.getElementById('recipientBlock');
        const paymentInfo = document.getElementById('paymentInfo');
        const payBtn = document.getElementById('payBtn');
        const errorMsg = document.getElementById('errorMsg');
        const recipientInput = document.getElementById('recipient');

        packages.forEach(pkg => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <span class="stars">${pkg.stars} ⭐</span>
                <span class="price">${pkg.rub} ₽</span>
            `;
            card.onclick = () => {
                document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
                card.classList.add('selected');
                selectedPackage = pkg;
                recipientBlock.classList.add('visible');
                paymentInfo.classList.add('visible');
                payBtn.classList.add('visible');
                console.log('✅ Выбран пакет:', pkg);
            };
            packagesGrid.appendChild(card);
        });

        payBtn.onclick = function() {
            errorMsg.classList.remove('visible');

            if (!selectedPackage) {
                errorMsg.textContent = '❌ Выберите пакет';
                errorMsg.classList.add('visible');
                return;
            }

            const recipient = recipientInput.value.trim();
            if (!recipient) {
                errorMsg.textContent = '❌ Введите username получателя';
                errorMsg.classList.add('visible');
                return;
            }

            const data = {
                action: 'create_invoice',
                stars: selectedPackage.stars,
                price_rub: selectedPackage.rub,
                recipient: recipient.replace('@', '')
            };

            console.log('📤 Отправка данных в бота:', data);

            if (tg && tg.sendData) {
                tg.sendData(JSON.stringify(data));
                console.log('✅ Данные отправлены');

                payBtn.disabled = true;
                payBtn.textContent = '✅ Отправлено!';

                setTimeout(() => {
                    tg.close();
                }, 1000);
            } else {
                console.log('⚠️ Демо-режим:', data);
                errorMsg.textContent = '⚠️ Демо-режим (не в Telegram)';
                errorMsg.classList.add('visible');
            }
        };
    </script>
</body>
</html>
